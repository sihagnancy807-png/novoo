<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pgmei | Gestão e Segurança</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syncopate:wght@700&display=swap');
        
        :root {
            --brazil-green: #009739;
            --brazil-yellow: #fedd00;
            --brazil-blue: #012169;
            --carbon: #010502;
            --grid-line: rgba(254, 221, 0, 0.08);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--carbon);
            color: #ffffff;
            margin: 0;
            overflow: hidden;
        }

        /* Fundo Dinâmico com Profundidade */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, var(--brazil-green) 0%, var(--carbon) 70%);
            z-index: 1;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 2;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        /* Card Neo-Industrial */
        .portal-card {
            background: rgba(1, 10, 5, 0.95);
            border: 1px solid rgba(254, 221, 0, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 151, 57, 0.05);
            position: relative;
            z-index: 10;
        }

        .card-accent {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--brazil-yellow), transparent);
        }

        /* Botão de Alta Performance (AMARELO) */
        .btn-action-glow {
            background: linear-gradient(135deg, var(--brazil-yellow), #e1c400);
            color: #000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(254, 221, 0, 0.2);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .btn-action-glow:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(254, 221, 0, 0.4);
            filter: brightness(1.05);
        }

        .font-syncopate {
            font-family: 'Syncopate', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>

    <div class="max-w-xl w-full">
        <!-- Header Técnico (Apenas Ícone) -->
        <div class="flex flex-col items-center mb-10 relative z-10">
            <div class="w-16 h-16 flex items-center justify-center rounded-2xl border border-yellow-500/30 bg-yellow-500/5 backdrop-blur-sm">
                <svg class="w-8 h-8 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
        </div>

        <!-- Card Principal -->
        <div class="portal-card rounded-3xl p-10 md:p-16 text-center overflow-hidden">
            <div class="card-accent"></div>

            <!-- Content Area -->
            <div class="space-y-10 pt-4">
                
                <!-- Botão Único -->
                <a href="https://atecoacessofeirao.shop/inicio/" 
                   class="btn-action-glow w-full py-8 rounded-2xl block no-underline font-bold text-2xl uppercase tracking-widest text-center">
                    APERTAR AQUI
                </a>

                <!-- Trust Badges Simplificados -->
                <div class="flex items-center justify-center gap-8 pt-4 border-t border-white/5">
                    <div class="flex flex-col items-center opacity-30">
                        <span class="text-[8px] font-bold uppercase tracking-widest mb-1">Rede</span>
                        <span class="text-xs font-bold text-green-500">ESTÁVEL</span>
                    </div>
                    <div class="w-px h-8 bg-white/10"></div>
                    <div class="flex flex-col items-center opacity-30">
                        <span class="text-[8px] font-bold uppercase tracking-widest mb-1">Segurança</span>
                        <span class="text-xs font-bold text-white">CRYPT-256</span>
                    </div>
                    <div class="w-px h-8 bg-white/10"></div>
                    <div class="flex flex-col items-center opacity-30">
                        <span class="text-[8px] font-bold uppercase tracking-widest mb-1">Servidor</span>
                        <span class="text-xs font-bold text-yellow-400">ATIVO</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-10 text-center relative z-10">
            <p class="text-[9px] font-bold uppercase tracking-[0.6em] text-white/20">
                Sistema Oficial Pgmei &copy; MMXXVI
            </p>
        </div>
    </div>

</body>
</html>
